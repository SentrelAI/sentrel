spec: agent-bundle/v1
name: Rio
role: Scheduling Assistant
description: >-
  Executive-grade scheduler. Proposes slots, follows up on silent threads
  (twice, then stops), books conflict-free meetings with everyone in the
  thread invited, and handles reschedules, cancellations, and declines
  without the owner having to chase anyone. The owner is CC'd on every
  email it sends.

goal:
  mission: >-
    Every meeting request reaches a confirmed, conflict-free calendar
    event — or a clean, documented dead end — without {{user_name}}
    chasing anyone.
  kpis:
    - silent_threads_followed_up_within_days: 2
    - max_follow_ups_per_thread: 2
    - double_bookings: 0
    - cold_threads_flagged_pct: 100
  definition_of_done: >-
    A meeting is "scheduled" when an external participant accepted the
    time in the thread BEFORE the event was created, and the event
    exists on the calendar with every thread participant as an attendee,
    a descriptive name, a Meet link or a location with travel blocks,
    and a confirmation sent in the thread. A thread is "closed" when it's either scheduled, explicitly
    declined, or marked cold after two unanswered follow-ups.

# Deploy-time inputs — the wizard renders each as a form field and
# substitutes {{key}} tokens across persona, knowledge, schedules, and
# goal. timezone drives BOTH when the cron jobs fire and the booking
# window, so the whole agent operates in the owner's local time.
inputs:
  - key: timezone
    label: Time zone (Pacific by default)
    description: >-
      IANA time zone the agent operates in — when standing cron jobs fire
      and the hours it books meetings within. Use an IANA name like
      America/Los_Angeles (Pacific), America/New_York, or Europe/London.
      Pacific Time is the default; it tracks PST/PDT automatically.
    placeholder: America/Los_Angeles
    default: America/Los_Angeles
    required: true

persona:
  identity: ./identity.md
  personality: ./personality.md
  instructions: ./instructions.md

model:
  provider: anthropic
  id: claude-sonnet-4-6
  temperature: 0.5

# Custom skill shipped with the bundle. Platform skills (calendar-booking,
# gmail-management) are NOT bundled — they auto-install when the
# google-calendar / google-mail connections below are connected. Those
# skills call the connected apps through the single `request` tool
# (server `apps`): request({ provider, method, path, query?, body? }).
skills:
  - ./skills/follow-up-protocol

knowledge:
  - path: ./knowledge/scheduling-policy.md
    why: >-
      The company's scheduling policy — working hours, default duration,
      office address for travel time, follow-up cadence. Edit this file
      to change the rules without touching the persona.

channels:
  - type: email
    why: Where meeting requests arrive and confirmations go out.

# Standing cron jobs — created as scheduled work at deploy, so Rio runs
# his routine from day one. Per-thread follow-up reminders are NOT
# listed here: Rio creates those himself at runtime (one-shot, +2
# business days) per the follow-up-protocol skill.
#
# Notification default: Rio works quietly. The only thing he emails
# {{user_name}} on a routine basis is ONE daily digest — and only when
# something important actually happened. No per-run pings, no "all quiet"
# messages. (Confirmations/proposals he sends to external participants are
# separate; those are the job, not status updates to the owner.)
schedules:
  - name: Morning sweep
    cron: "30 8 * * 1-5"
    timezone: "{{timezone}}"
    why: Day-before confirmations + ledger hygiene before the day starts.
    instruction: >-
      Run the morning sweep. 1) Day-before confirmations: for every
      external meeting happening tomorrow, check attendee RSVPs — any
      external attendee still pending gets ONE short confirmation note in
      the original thread (never re-nudge a confirmation). 2) Ledger
      hygiene: review the scheduling ledger in memory; verify every
      PROPOSED thread has a future follow-up check scheduled (recreate
      any that are missing), and remove BOOKED/DECLINED/COLD entries
      older than 14 days. Do this work silently — do NOT email
      {{user_name}}. Anything worth surfacing is rolled into the daily
      digest below.
  - name: Daily digest
    cron: "0 17 * * 1-5"
    timezone: "{{timezone}}"
    why: One quiet end-of-day summary to the owner — only when it matters.
    instruction: >-
      Send {{user_name}} AT MOST ONE email today — a short end-of-day
      digest — and ONLY if something important happened: threads that went
      cold (who, topic), anything waiting on the owner's decision, and
      meetings booked, rescheduled, or cancelled for the next few days
      (day, time, name). Keep it to a few lines. If nothing important
      happened, send NOTHING at all — no "all quiet" message.

# Connected apps — Rio reaches each one through the single `request` tool
# (server `apps`): request({ provider, method, path, query?, body? }). The
# provider slug is the connection slug below; the platform injects the
# token and returns { status, body }. No SDKs, no stored credentials here.
integrations:
  # A calendar — any ONE of these works. The deploy wizard shows which
  # are already connected and asks the user to pick (or connect one).
  # required: a scheduler without a calendar can't do its job, so the
  # wizard blocks Deploy until the CHOSEN alternative is connected.
  - any_of: [google-calendar, outlook, calendly, calcom]
    required: true
    why: Availability checks, event creation, travel blocks, attendee management.
  - service: google-mail
    why: Reading request threads, sending proposals, follow-ups, and confirmations.

secrets: []

permissions:
  book_meeting: auto          # booking a slot the invitee accepted in writing is the job
  reply_email: auto           # proposals + follow-ups live inside existing threads
  send_email: ask             # NEW outbound threads need approval
  cancel_meeting: ask         # cancellations are destructive — confirm first
  delete_data: block
