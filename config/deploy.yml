# Name of your application. Used to uniquely configure containers.
service: alchemy

# Container image — built and pushed to GHCR.
image: parsedev/alchemy

# Deploy to these servers.
servers:
  web:
    - 52.2.137.107
  job:
    hosts:
      - 52.2.137.107
    cmd: bundle exec sidekiq

# SSL via Let's Encrypt. Point DNS A record at the EC2 IP first, then deploy.
proxy:
  ssl: true
  host: alchemy.scribemd.ai

# GHCR registry.
registry:
  server: ghcr.io
  username: parsedev
  password:
    - KAMAL_REGISTRY_PASSWORD

# Inject ENV variables into containers (secrets come from .kamal/secrets).
env:
  clear:
    RAILS_ENV: production
    WEB_CONCURRENCY: 2
    RAILS_LOG_LEVEL: info
    AWS_REGION: us-east-1
    DEPLOY_ENV: prod
    AGENT_PROVISIONER: ""           # leave empty until Fly wiring is ready
    WEBHOOK_BASE_URL: https://alchemy.scribemd.ai
    RAILS_INTERNAL_URL: https://alchemy.scribemd.ai
  secret:
    - RAILS_MASTER_KEY
    - DATABASE_URL
    - REDIS_URL
    - ENGINE_API_SECRET
    - PREFIXED_IDS_SALT
    - COMPOSIO_API_KEY
    - ANTHROPIC_API_KEY
    - OPENAI_API_KEY
    - TWILIO_ACCOUNT_SID
    - TWILIO_AUTH_TOKEN
    - TWILIO_SERVICE_SID
    - AWS_ACCESS_KEY_ID
    - AWS_SECRET_ACCESS_KEY
    - AWS_ACCOUNT_ID
    - SENTRY_DSN

# Aliases are triggered with "bin/kamal <alias>".
aliases:
  console: app exec --interactive --reuse "bin/rails console"
  shell: app exec --interactive --reuse "bash"
  logs: app logs -f
  dbc: app exec --interactive --reuse "bin/rails dbconsole --include-password"

# Persistent storage for ActiveStorage disk-backed files (if used locally;
# production uses S3 via aws-sdk-s3, so this is mostly for uploads-in-flight).
volumes:
  - "alchemy_storage:/rails/storage"

# Bridge fingerprinted assets between versions to avoid 404s on in-flight requests.
asset_path: /rails/public/assets

# Configure the image builder.
builder:
  arch: amd64
  # Remote arm64→amd64 build from a Mac:
  # remote: ssh://docker@docker-builder-server

# Use a different ssh user than root
ssh:
  user: ubuntu
  keys: ["~/Downloads/alchemy_key.pem"]
