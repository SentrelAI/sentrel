default: &default
  adapter: postgresql
  encoding: unicode
  max_connections: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>

development:
  primary:
    <<: *default
    database: alchemy_development

test:
  primary:
    <<: *default
    database: alchemy_test

production:
  primary:
    <<: *default
    url: <%= ENV["DATABASE_URL"] %>
