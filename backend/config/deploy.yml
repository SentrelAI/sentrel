# Name of your application. Used to uniquely configure containers.
# NOTE: kept as "alchemy" deliberately — this is an INTERNAL kamal label only
# (container names + kamal-proxy routing key), invisible to users. Renaming it to
# "sentrel" conflicts with the running alchemy service for www.sentrel.ai in
# kamal-proxy ("host settings conflict"), which would require tearing the old
# service down first (downtime). Everything user-visible is already sentrel
# (image, module, cable). Rename this last, in a maintenance window, if desired.
service: alchemy

# Container image — built and pushed to GHCR (sentrel-branded).
image: sentrelai/sentrel

# Deploy to these servers.
servers:
  web:
    - 52.2.137.107
  job:
    hosts:
      - 52.2.137.107
    cmd: bundle exec sidekiq

# SSL via a Cloudflare Origin Certificate (not Let's Encrypt). The domain is
# proxied through Cloudflare (orange cloud), so ACME HTTP-01 can't validate
# against this origin — Cloudflare intercepts :80/:443. Instead kamal-proxy
# serves a long-lived Cloudflare Origin cert and Cloudflare runs in Full
# (strict) mode. CERTIFICATE_PEM / PRIVATE_KEY_PEM are secret names resolved
# from .kamal/secrets (materialized from GitHub Secrets in CI).
proxy:
  ssl:
    certificate_pem: CERTIFICATE_PEM
    private_key_pem: PRIVATE_KEY_PEM
  hosts:
    - www.sentrel.ai
    - sentrel.ai

# GHCR registry.
registry:
  server: ghcr.io
  username: parsedev
  password:
    - KAMAL_REGISTRY_PASSWORD

# Inject ENV variables into containers (secrets come from .kamal/secrets).
env:
  clear:
    RAILS_ENV: production
    WEB_CONCURRENCY: 2
    RAILS_LOG_LEVEL: info
    AWS_REGION: us-east-1
    DEPLOY_ENV: prod
    AGENT_PROVISIONER: fly
    WEBHOOK_BASE_URL: https://www.sentrel.ai
    RAILS_INTERNAL_URL: https://www.sentrel.ai
    # Self-hosted Nango (services/nango on Fly). Rails runs on EC2 (kamal), NOT
    # on Fly's private network, so it reaches Nango over the PUBLIC URL. Use the
    # connect.sentrel.ai domain (Caddy routes its API paths to the server, and
    # serves the static Connect UI for the browser to iframe — fly.dev would
    # route to the dashboard, which sets X-Frame-Options and blocks framing).
    NANGO_BASE_URL: https://connect.sentrel.ai
    NANGO_CONNECT_BASE_URL: https://connect.sentrel.ai
    # Facebook Login for Business (one-click Connect Meta). Flip to "true" once
    # the FLB configuration exists and META_APP_ID/SECRET + META_FBL_CONFIG_ID
    # are in .kamal/secrets. "false" = the flow is inert (token connect only).
    META_FBL_ENABLED: "false"
    META_GRAPH_VERSION: v21.0
  secret:
    - RAILS_MASTER_KEY
    - DATABASE_URL
    - REDIS_URL
    - ENGINE_DATABASE_URL
    - ENGINE_REDIS_URL
    - ENGINE_API_SECRET
    - PREFIXED_IDS_SALT
    - NANGO_SECRET_KEY
    - ANTHROPIC_API_KEY
    - OPENAI_API_KEY
    - OPENROUTER_API_KEY
    - GH_TOKEN
    - SKILLS_SH_API_KEY
    - TWILIO_ACCOUNT_SID
    - TWILIO_AUTH_TOKEN
    - TWILIO_SERVICE_SID
    - SLACK_CLIENT_ID
    - SLACK_CLIENT_SECRET
    - SLACK_SIGNING_SECRET
    - META_APP_ID
    - META_APP_SECRET
    - META_FBL_CONFIG_ID
    - AWS_ACCESS_KEY_ID
    - AWS_SECRET_ACCESS_KEY
    - AWS_ACCOUNT_ID
    - SENTRY_DSN
    - FLY_API_TOKEN
    - FLY_ORG_SLUG
    - FLY_REGION
    - ENGINE_IMAGE
    - ACTIVE_RECORD_ENCRYPTION_PRIMARY_KEY
    - ACTIVE_RECORD_ENCRYPTION_DETERMINISTIC_KEY
    - ACTIVE_RECORD_ENCRYPTION_KEY_DERIVATION_SALT
    - CLOUDFLARE_API_KEY
    - CLOUDFLARE_ACCOUNT_ID
    - GOOGLE_OAUTH_CLIENT_ID
    - GOOGLE_OAUTH_CLIENT_SECRET
    - PLAUSIBLE_SCRIPT_ID

# Aliases are triggered with "bin/kamal <alias>".
aliases:
  console: app exec --interactive --reuse "bin/rails console"
  shell: app exec --interactive --reuse "bash"
  logs: app logs -f
  dbc: app exec --interactive --reuse "bin/rails dbconsole --include-password"

# Accessories — long-lived sidecar containers managed separately from the app.
# `kamal deploy` does NOT touch these; boot/update them explicitly:
#   bundle exec kamal accessory boot vector
accessories:
  # Vector log forwarder → Better Stack (Telemetry source "sentryai"). Tails the
  # stdout of the alchemy-web (Rails) and alchemy-job (Sidekiq) containers via
  # the host Docker socket and ships each line. Config in config/vector.yaml;
  # the source token comes from BETTERSTACK_SOURCE_TOKEN in .kamal/secrets.
  vector:
    image: timberio/vector:0.44.0-alpine
    host: 52.2.137.107
    env:
      secret:
        - BETTERSTACK_SOURCE_TOKEN
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    files:
      - config/vector.yaml:/etc/vector/vector.yaml

# Persistent storage for ActiveStorage disk-backed files (if used locally;
# production uses S3 via aws-sdk-s3, so this is mostly for uploads-in-flight).
volumes:
  - "alchemy_storage:/rails/storage"

# Bridge fingerprinted assets between versions to avoid 404s on in-flight requests.
asset_path: /rails/public/assets

# Configure the image builder.
builder:
  arch: amd64
  # Remote arm64→amd64 build from a Mac:
  # remote: ssh://docker@docker-builder-server

# Use a different ssh user than root
ssh:
  user: ubuntu
  keys: ["~/Downloads/alchemy_key.pem"]

# Redeploy trigger 2026-06-19: rotate compromised ANTHROPIC_API_KEY — picks up
# the new secrets.ANTHROPIC_API_KEY from GitHub Actions into the running env.
