# Static integration catalog.
#
# Each entry is one connectable app. Keyed by `service_name` (our internal
# slug, also what SkillDefinition.requires_connections must match). Loaded by
# IntegrationCatalog (app/services/integration_catalog.rb).
#
# Fields:
#   label               human name shown in the UI
#   category            grouping for the Integrations page filter
#   provider_config_key Nango integration key (from providers.yaml). Omitted
#                       for `tool: mcp` apps (those use a dedicated MCP server).
#   auth_type           oauth2 | api_key  (how the provider authenticates)
#   api_base_url        base URL the agent's nango_request paths are relative to
#   docs_url            provider API reference (surfaced to the agent)
#   scopes              default OAuth scopes requested in managed mode
#   modes               connect modes offered to the user, in priority order
#                       (managed | byo_oauth | byo_token)
#   tool                proxy  -> generic nango_request + a SKILL.md
#                       mcp    -> a dedicated McpServer (rich named tools)
#   review              none | google | gated  (UI badge: what managed needs)
#
# Ship-first 🟢 (standard OAuth, managed works immediately) ---------------------

github:
  logo: /integration-logos/github.svg
  label: GitHub
  category: Developer
  provider_config_key: github
  auth_type: oauth2
  api_base_url: https://api.github.com
  docs_url: https://docs.github.com/en/rest
  scopes: [repo, read:org, read:user]
  modes: [managed, byo_oauth, byo_token]
  tool: proxy
  review: none

