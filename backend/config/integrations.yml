# Gated 🔴 (Sentrel app review + business verification; paste-token bridges) ----

# Meta Ads is served by the dedicated self-hosted MCP (services/meta-ads-mcp),
# NOT the Nango proxy — it needs the full ads funnel surface. Listed here so it
# shows in the catalog; `tool: mcp` routes it to the McpServer path.
meta_ads:
  label: Meta Ads
  category: Marketing
  auth_type: oauth2
  api_base_url: https://graph.facebook.com
  docs_url: https://developers.facebook.com/docs/marketing-apis
  modes: [byo_token, managed]
  tool: mcp
  review: gated

linkedin:
  label: LinkedIn
  category: Marketing
  provider_config_key: linkedin
  auth_type: oauth2
  api_base_url: https://api.linkedin.com
  docs_url: https://learn.microsoft.com/en-us/linkedin/
  scopes: [r_liteprofile, w_member_social]
  modes: [byo_token, managed, byo_oauth]
  tool: proxy
  review: gated

tiktok:
  label: TikTok Ads
  category: Marketing
  provider_config_key: tiktok-ads
  auth_type: oauth2
  api_base_url: https://business-api.tiktok.com
  docs_url: https://business-api.tiktok.com/portal/docs
  scopes: []
  modes: [byo_token, managed, byo_oauth]
  tool: proxy
  review: gated
