# Gated 🔴 (Sentrel app review + business verification; paste-token bridges) ----

# Meta Ads is served by the dedicated self-hosted MCP (services/meta-ads-mcp),
# NOT the Nango proxy — it needs the full ads funnel surface. Listed here so it
# shows in the catalog; `tool: mcp` routes it to the McpServer path.
meta_ads:
  logo: /integration-logos/meta_ads.svg
  label: Meta Ads
  category: Marketing
  auth_type: oauth2
  api_base_url: https://graph.facebook.com
  docs_url: https://developers.facebook.com/docs/marketing-apis
  modes: [byo_token, managed]
  tool: mcp
  review: gated
  # Connect routes to the dedicated MCP server's OAuth (not Nango).
  mcp_url: https://sentrel-meta-mcp.fly.dev/mcp

