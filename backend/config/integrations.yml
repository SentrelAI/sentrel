slack:
  logo: /integration-logos/slack.svg
  label: Slack
  category: Communication
  provider_config_key: slack
  auth_type: oauth2
  api_base_url: https://slack.com/api
  docs_url: https://api.slack.com/methods
  scopes: [chat:write, channels:read, channels:history, users:read]
  modes: [managed, byo_oauth, byo_token]
  tool: proxy
  review: none

sentry:
  logo: /integration-logos/sentry.svg
  label: Sentry
  category: Developer
  # Sentry's OAuth is the heavy "Public Integrations" flow (needs Hostname +
  # User ID); its Auth Token (API key) path is simpler and just as capable, so
  # we use Nango's api_key `sentry` integration — the user pastes a Sentry Auth
  # Token in the Connect UI and Nango injects it on /proxy calls.
  provider_config_key: sentry
  auth_type: api_key
  api_base_url: https://sentry.io/api/0
  docs_url: https://docs.sentry.io/api/
  scopes: []
  modes: [managed]
  tool: proxy
  review: none

# Vercel ships as API_KEY in Nango (no OAuth template) -> paste-token only.
vercel:
  logo: /integration-logos/vercel.svg
  label: Vercel
  category: Developer
  auth_type: api_key
  api_base_url: https://api.vercel.com
  docs_url: https://vercel.com/docs/rest-api
  modes: [byo_token]
  tool: proxy
  review: none

# Stripe via Nango's api_key integration (unique_key `stripe-api-key`) — the
# user pastes a Stripe secret key in the Connect UI and Nango injects it.
stripe:
  logo: /integration-logos/stripe.svg
  label: Stripe
  category: Finance
  provider_config_key: stripe-api-key
  auth_type: api_key
  api_base_url: https://api.stripe.com
  docs_url: https://stripe.com/docs/api
  scopes: []
  modes: [managed]
  tool: proxy
  review: none

