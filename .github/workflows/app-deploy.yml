name: app-deploy

# Builds the Rails container image and runs `kamal deploy` to the EC2 host
# defined in config/deploy.yml. Triggered manually OR on push to main when
# Rails-side files change (so engine-only PRs don't redeploy Rails).
#
# Required repo secrets (Settings → Secrets and variables → Actions):
#   SSH_DEPLOY_KEY                                — private key matching the
#                                                   public key on the EC2 host's
#                                                   ~/.ssh/authorized_keys
#   KAMAL_REGISTRY_PASSWORD                       — GHCR push token (read+write)
#   RAILS_MASTER_KEY                              — contents of config/master.key
#   ENGINE_API_SECRET, PREFIXED_IDS_SALT          — app-level secrets
#   DATABASE_URL, REDIS_URL                        — RDS + Elasticache URLs
#   ENGINE_DATABASE_URL, ENGINE_REDIS_URL          — IPv6 over Fly LAN
#   COMPOSIO_API_KEY                              — integration catalog
#   ANTHROPIC_API_KEY, OPENAI_API_KEY, OPENROUTER_API_KEY
#   TWILIO_ACCOUNT_SID, TWILIO_AUTH_TOKEN, TWILIO_SERVICE_SID
#   AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, AWS_ACCOUNT_ID
#   FLY_API_TOKEN, FLY_ORG_SLUG, FLY_REGION
#   ENGINE_IMAGE                                  — ghcr.io/sentrelai/sentrel-engine:latest
#   SENTRY_DSN
#   ACTIVE_RECORD_ENCRYPTION_PRIMARY_KEY
#   ACTIVE_RECORD_ENCRYPTION_DETERMINISTIC_KEY
#   ACTIVE_RECORD_ENCRYPTION_KEY_DERIVATION_SALT
#   SLACK_CLIENT_ID, SLACK_CLIENT_SECRET, SLACK_SIGNING_SECRET
#   PLAUSIBLE_SCRIPT_ID                           — public Plausible site script id

on:
  push:
    branches: [main]
    # Only fire on Rails-side changes. Engine has its own workflow; docs +
    # workflows themselves shouldn't trigger a kamal deploy.
    paths:
      - "backend/**"
      - ".github/workflows/app-deploy.yml"
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    # Rails lives at backend/ post-monorepo move. Run every step from there so
    # Gemfile lookup, kamal config, and Dockerfile resolution all just work.
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          # backend/.ruby-version pins ruby-3.4.9. setup-ruby's
          # working-directory input doesn't always resolve .ruby-version
          # correctly when bundler-cache is set — explicit ruby-version-file
          # is the reliable path.
          ruby-version-file: backend/.ruby-version
          bundler-cache: true
          working-directory: backend

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.KAMAL_REGISTRY_PASSWORD }}

      # kamal SSH's into the host to run docker. webfactory/ssh-agent handles
      # the private-key paste-formatting gauntlet (CRLF, missing trailing
      # newline, libcrypto errors) for us and loads the key into an
      # ssh-agent. We deliberately DO NOT pre-populate known_hosts — Net::SSH
      # (kamal's SSH client) defaults to verify_host_key: :always, which
      # means 'add new hosts automatically, only error on mismatch with an
      # existing entry'. Pre-populating gave us mismatches; skipping it lets
      # the first connect just work.
      - uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.SSH_DEPLOY_KEY }}

      # Write .kamal/secrets from repo secrets. The committed .kamal/secrets
      # is git-ignored; CI rebuilds it from GitHub Secrets each run.
      - name: Materialize .kamal/secrets
        env:
          KAMAL_REGISTRY_PASSWORD: ${{ secrets.KAMAL_REGISTRY_PASSWORD }}
          RAILS_MASTER_KEY: ${{ secrets.RAILS_MASTER_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          REDIS_URL: ${{ secrets.REDIS_URL }}
          ENGINE_DATABASE_URL: ${{ secrets.ENGINE_DATABASE_URL }}
          ENGINE_REDIS_URL: ${{ secrets.ENGINE_REDIS_URL }}
          ENGINE_API_SECRET: ${{ secrets.ENGINE_API_SECRET }}
          PREFIXED_IDS_SALT: ${{ secrets.PREFIXED_IDS_SALT }}
          COMPOSIO_API_KEY: ${{ secrets.COMPOSIO_API_KEY }}
          NANGO_SECRET_KEY: ${{ secrets.NANGO_SECRET_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          CLOUDFLARE_API_KEY: ${{ secrets.CLOUDFLARE_API_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          SKILLS_SH_API_KEY: ${{ secrets.SKILLS_SH_API_KEY }}
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_SERVICE_SID: ${{ secrets.TWILIO_SERVICE_SID }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          FLY_ORG_SLUG: ${{ secrets.FLY_ORG_SLUG }}
          FLY_REGION: ${{ secrets.FLY_REGION }}
          ENGINE_IMAGE: ${{ secrets.ENGINE_IMAGE }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          SLACK_CLIENT_ID: ${{ secrets.SLACK_CLIENT_ID }}
          SLACK_CLIENT_SECRET: ${{ secrets.SLACK_CLIENT_SECRET }}
          SLACK_SIGNING_SECRET: ${{ secrets.SLACK_SIGNING_SECRET }}
          META_APP_ID: ${{ secrets.META_APP_ID }}
          META_APP_SECRET: ${{ secrets.META_APP_SECRET }}
          META_FBL_CONFIG_ID: ${{ secrets.META_FBL_CONFIG_ID }}
      GITHUB_TEMPLATES_TOKEN: ${{ secrets.GH_TEMPLATES_TOKEN }}
          ACTIVE_RECORD_ENCRYPTION_PRIMARY_KEY: ${{ secrets.ACTIVE_RECORD_ENCRYPTION_PRIMARY_KEY }}
          ACTIVE_RECORD_ENCRYPTION_DETERMINISTIC_KEY: ${{ secrets.ACTIVE_RECORD_ENCRYPTION_DETERMINISTIC_KEY }}
          ACTIVE_RECORD_ENCRYPTION_KEY_DERIVATION_SALT: ${{ secrets.ACTIVE_RECORD_ENCRYPTION_KEY_DERIVATION_SALT }}
          GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
          GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
          PLAUSIBLE_SCRIPT_ID: ${{ secrets.PLAUSIBLE_SCRIPT_ID }}
          BETTERSTACK_SOURCE_TOKEN: ${{ secrets.BETTERSTACK_SOURCE_TOKEN }}
          # Cloudflare Origin Certificate (cert + key PEM) served by kamal-proxy.
          CERTIFICATE_PEM: ${{ secrets.CERTIFICATE_PEM }}
          PRIVATE_KEY_PEM: ${{ secrets.PRIVATE_KEY_PEM }}
        run: |
          mkdir -p .kamal
          # backend/config/master.key needs to be a file for the secrets-file
          # pattern `RAILS_MASTER_KEY=$(cat config/master.key)`. We're already
          # in backend/ via working-directory default, so 'config/' resolves
          # to backend/config/.
          mkdir -p config && echo -n "$RAILS_MASTER_KEY" > config/master.key
          cat > .kamal/secrets <<EOF
          KAMAL_REGISTRY_PASSWORD=$KAMAL_REGISTRY_PASSWORD
          RAILS_MASTER_KEY=$RAILS_MASTER_KEY
          DATABASE_URL=$DATABASE_URL
          REDIS_URL=$REDIS_URL
          ENGINE_DATABASE_URL=$ENGINE_DATABASE_URL
          ENGINE_REDIS_URL=$ENGINE_REDIS_URL
          ENGINE_API_SECRET=$ENGINE_API_SECRET
          PREFIXED_IDS_SALT=$PREFIXED_IDS_SALT
          COMPOSIO_API_KEY=$COMPOSIO_API_KEY
          NANGO_SECRET_KEY=$NANGO_SECRET_KEY
          ANTHROPIC_API_KEY=$ANTHROPIC_API_KEY
          OPENAI_API_KEY=$OPENAI_API_KEY
          OPENROUTER_API_KEY=$OPENROUTER_API_KEY
          CLOUDFLARE_API_KEY=$CLOUDFLARE_API_KEY
          CLOUDFLARE_ACCOUNT_ID=$CLOUDFLARE_ACCOUNT_ID
          GH_TOKEN=$GH_TOKEN
          SKILLS_SH_API_KEY=$SKILLS_SH_API_KEY
          TWILIO_ACCOUNT_SID=$TWILIO_ACCOUNT_SID
          TWILIO_AUTH_TOKEN=$TWILIO_AUTH_TOKEN
          TWILIO_SERVICE_SID=$TWILIO_SERVICE_SID
          AWS_ACCESS_KEY_ID=$AWS_ACCESS_KEY_ID
          AWS_SECRET_ACCESS_KEY=$AWS_SECRET_ACCESS_KEY
          AWS_ACCOUNT_ID=$AWS_ACCOUNT_ID
          AWS_REGION=us-east-1
          DEPLOY_ENV=prod
          WEBHOOK_BASE_URL=https://www.sentrel.ai
          RAILS_INTERNAL_URL=https://www.sentrel.ai
          FLY_API_TOKEN=$FLY_API_TOKEN
          FLY_ORG_SLUG=$FLY_ORG_SLUG
          FLY_REGION=$FLY_REGION
          ENGINE_IMAGE=$ENGINE_IMAGE
          SENTRY_DSN=$SENTRY_DSN
          SLACK_CLIENT_ID=$SLACK_CLIENT_ID
          SLACK_CLIENT_SECRET=$SLACK_CLIENT_SECRET
          SLACK_SIGNING_SECRET=$SLACK_SIGNING_SECRET
          META_APP_ID=$META_APP_ID
          META_APP_SECRET=$META_APP_SECRET
          META_FBL_CONFIG_ID=$META_FBL_CONFIG_ID
          GITHUB_TEMPLATES_TOKEN=$GITHUB_TEMPLATES_TOKEN
          ACTIVE_RECORD_ENCRYPTION_PRIMARY_KEY=$ACTIVE_RECORD_ENCRYPTION_PRIMARY_KEY
          ACTIVE_RECORD_ENCRYPTION_DETERMINISTIC_KEY=$ACTIVE_RECORD_ENCRYPTION_DETERMINISTIC_KEY
          ACTIVE_RECORD_ENCRYPTION_KEY_DERIVATION_SALT=$ACTIVE_RECORD_ENCRYPTION_KEY_DERIVATION_SALT
          GOOGLE_OAUTH_CLIENT_ID=$GOOGLE_OAUTH_CLIENT_ID
          GOOGLE_OAUTH_CLIENT_SECRET=$GOOGLE_OAUTH_CLIENT_SECRET
          PLAUSIBLE_SCRIPT_ID=$PLAUSIBLE_SCRIPT_ID
          BETTERSTACK_SOURCE_TOKEN=$BETTERSTACK_SOURCE_TOKEN
          CERTIFICATE_PEM="$CERTIFICATE_PEM"
          PRIVATE_KEY_PEM="$PRIVATE_KEY_PEM"
          EOF

      - name: kamal deploy
        env:
          KAMAL_REGISTRY_PASSWORD: ${{ secrets.KAMAL_REGISTRY_PASSWORD }}
        run: bundle exec kamal deploy

      - name: Run pending migrations
        env:
          KAMAL_REGISTRY_PASSWORD: ${{ secrets.KAMAL_REGISTRY_PASSWORD }}
        run: bundle exec kamal app exec 'bin/rails db:migrate'

      - name: Summary
        run: |
          echo "### Deployed" >> $GITHUB_STEP_SUMMARY
          echo "- Image: ghcr.io/sentrelai/sentrel:${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- Host: www.sentrel.ai" >> $GITHUB_STEP_SUMMARY
