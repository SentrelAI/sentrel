name: Build engine image

# Build + push the per-agent engine image to GHCR whenever the engine/
# subtree changes. Each agent's Fly Machine pulls :latest on its next
# cold-boot, picking up the new code.
on:
  push:
    branches: [main]
    paths:
      - "engine/src/**"
      - "engine/skills/**"
      - "engine/Dockerfile"
      - "engine/package.json"
      - "engine/bun.lock"
      - ".github/workflows/engine-image.yml"
  workflow_dispatch: {}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    # Multi-arch builds under qemu emulation can run an hour on the default
    # 6h runner — cap explicitly so a hang fails fast instead of burning
    # quota.
    timeout-minutes: 45
    permissions:
      packages: write
      contents: read
    # Cancel an in-flight build when a new push comes in. Prevents two long
    # multi-arch builds racing for the same `:latest` tag.
    concurrency:
      group: engine-image-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4

      # GHCR requires lowercase repository names. github.repository_owner
      # preserves the GitHub-org casing (e.g. "ParseDev"), which breaks the
      # push. Lowercase it once here and reference the output everywhere.
      - name: Compute lowercase image base
        id: image
        run: |
          OWNER_LOWER="${GITHUB_REPOSITORY_OWNER,,}"
          echo "base=ghcr.io/${OWNER_LOWER}/sentrel-engine" >> $GITHUB_OUTPUT

      # Set up Buildx with retries against Docker Hub flakes. We've seen
      # registry-1.docker.io time out at builder-bootstrap time —
      # "context deadline exceeded" — for no reason other than Docker
      # Hub being slow. One retry handles the common case; if it's a
      # sustained outage the second attempt fails the same way and we
      # surface that to the user.
      - name: Set up Docker Buildx (attempt 1)
        id: buildx-1
        uses: docker/setup-buildx-action@v3
        continue-on-error: true
      - name: Wait + retry on Docker Hub flake
        if: steps.buildx-1.outcome == 'failure'
        run: sleep 20
      - name: Set up Docker Buildx (attempt 2)
        if: steps.buildx-1.outcome == 'failure'
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Bake the commit SHA into the image so /ops/runs can show which
      # engine version produced a given audit log row.
      - name: Stamp .git-sha
        run: echo "${{ github.sha }}" > engine/.git-sha

      - name: Build + push (multi-arch)
        # amd64 + arm64 — Fly lax is x86 today but other regions / future
        # hosts may be arm. timeout-minutes + concurrency guard above keep
        # this from wedging if qemu emulation stalls.
        uses: docker/build-push-action@v5
        with:
          context: ./engine
          platforms: linux/amd64,linux/arm64
          push: true
          cache-from: type=gha
          cache-to:   type=gha,mode=max
          tags: |
            ${{ steps.image.outputs.base }}:latest
            ${{ steps.image.outputs.base }}:${{ github.sha }}

      - name: Summary
        run: |
          echo "### Pushed" >> $GITHUB_STEP_SUMMARY
          echo "- ${{ steps.image.outputs.base }}:latest" >> $GITHUB_STEP_SUMMARY
          echo "- ${{ steps.image.outputs.base }}:${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
