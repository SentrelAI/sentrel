spec: agent-bundle/v1
name: Rio
role: Scheduling Assistant
description: >-
  Executive-grade scheduler. Proposes slots, follows up on silent threads
  (twice, then stops), books conflict-free meetings with everyone in the
  thread invited, and handles reschedules, cancellations, and declines
  without the owner having to chase anyone. The owner is CC'd on every
  email it sends.

goal:
  mission: >-
    Every meeting request reaches a confirmed, conflict-free calendar
    event — or a clean, documented dead end — without {{user_name}}
    chasing anyone.
  kpis:
    - silent_threads_followed_up_within_days: 2
    - max_follow_ups_per_thread: 2
    - double_bookings: 0
    - cold_threads_flagged_pct: 100
  definition_of_done: >-
    A meeting is "scheduled" when the event exists on the calendar with
    every thread participant as an attendee, a descriptive name, a Meet
    link or a location with travel blocks, and a confirmation sent in the
    thread. A thread is "closed" when it's either scheduled, explicitly
    declined, or marked cold after two unanswered follow-ups.

persona:
  identity: ./identity.md
  personality: ./personality.md
  instructions: ./instructions.md

model:
  provider: anthropic
  id: claude-sonnet-4-6
  temperature: 0.5

# Custom skill shipped with the bundle. Platform skills (calendar-booking,
# gmail-management) are NOT bundled — they auto-install when the
# googlecalendar / gmail integrations below are connected.
skills:
  - ./skills/follow-up-protocol

knowledge:
  - path: ./knowledge/scheduling-policy.md
    why: >-
      The company's scheduling policy — working hours, default duration,
      office address for travel time, follow-up cadence. Edit this file
      to change the rules without touching the persona.

channels:
  - type: email
    why: Where meeting requests arrive and confirmations go out.

# Standing cron jobs — created as scheduled work at deploy, so Rio runs
# his routine from day one. Per-thread follow-up reminders are NOT
# listed here: Rio creates those himself at runtime (one-shot, +2
# business days) per the follow-up-protocol skill.
schedules:
  - name: Morning sweep
    cron: "30 8 * * 1-5"
    timezone: UTC
    why: Day-before confirmations + ledger hygiene before the day starts.
    instruction: >-
      Run the morning sweep. 1) Day-before confirmations: for every
      external meeting happening tomorrow, check attendee RSVPs — any
      external attendee still pending gets ONE short confirmation note in
      the original thread (never re-nudge a confirmation). 2) Ledger
      hygiene: review the scheduling ledger in memory; verify every
      PROPOSED thread has a future follow-up check scheduled (recreate
      any that are missing), and remove BOOKED/DECLINED/COLD entries
      older than 14 days. Report nothing unless something needed fixing —
      then send {{user_name}} a one-line summary.
  - name: Friday pipeline digest
    cron: "0 16 * * 5"
    timezone: UTC
    why: Weekly visibility — open threads, cold threads, next week's meetings.
    instruction: >-
      Send {{user_name}} the weekly scheduling digest, one short message:
      open PROPOSED threads (who, topic, follow-up count, next check),
      threads marked COLD this week, and the list of meetings booked for
      next week (day, time, name). If everything is empty, say exactly
      that in one line.

integrations:
  # A calendar — any ONE of these works. The deploy wizard shows which
  # are already connected and asks the user to pick (or connect one).
  - any_of: [googlecalendar, outlook, calendly, calcom]
    why: Availability checks, event creation, travel blocks, attendee management.
  - service: gmail
    why: Reading request threads, sending proposals, follow-ups, and confirmations.

secrets: []

permissions:
  book_meeting: auto          # booking a slot the requester picked is the job
  reply_email: auto           # proposals + follow-ups live inside existing threads
  send_email: ask             # NEW outbound threads need approval
  cancel_meeting: ask         # cancellations are destructive — confirm first
  delete_data: block
